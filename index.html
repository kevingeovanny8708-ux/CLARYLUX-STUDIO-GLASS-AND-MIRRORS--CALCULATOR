<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clarylux Studio</title>

<style>
body {
  background: linear-gradient(145deg, #0a0a0a, #111);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 5px;
}

.sub {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 20px;
}

.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.08);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
  font-weight: bold;
}

.delete {
  background: #ef4444;
  margin-top: 10px;
}

.total {
  text-align: center;
  font-size: 24px;
  margin-top: 20px;
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">
  <h2>CLARYLUX STUDIO ✨</h2>
  <div class="sub">Glass & Mirror Calculator</div>

  <input type="number" id="margin" placeholder="Margin % (ej: 40)" value="40">

  <div id="piezas"></div>

  <button onclick="agregarPieza()">+ Agregar pieza</button>
  <button onclick="calcular()">💰 Calcular</button>

  <div class="total" id="total"></div>
</div>

<script>
let contador = 0;

function agregarPieza() {
  contador++;

  let div = document.createElement("div");
  div.className = "card";
  div.id = "pieza"+contador;

  div.innerHTML = `
    <h4>Pieza ${contador}</h4>

    <input type="number" placeholder="Width" id="w${contador}">
    <input type="number" placeholder="Height" id="h${contador}">

    <select id="glass${contador}">
      <option value="clear">Clear</option>
      <option value="lowiron">Low Iron</option>
      <option value="laminated">Laminado</option>
      <option value="mirror">Mirror</option>
    </select>

    <select id="thickness${contador}">
      <option value="1">1/4</option>
      <option value="1.5">3/8</option>
      <option value="2">1/2</option>
      <option value="2.5">5/8</option>
    </select>

    <select id="temper${contador}">
      <option value="no">No Tempered</option>
      <option value="yes">Tempered</option>
    </select>

    <input type="number" placeholder="Holes ($25 c/u)" id="holes${contador}">
    <input type="number" placeholder="Extras $" id="extra${contador}">

    <button class="delete" onclick="eliminar(${contador})">Eliminar</button>
  `;

  document.getElementById("piezas").appendChild(div);
}

function eliminar(id) {
  let pieza = document.getElementById("pieza"+id);
  if (pieza) pieza.remove();
}

function calcular() {
  let totalCosto = 0;

  for (let i = 1; i <= contador; i++) {
    let w = Number(document.getElementById("w"+i)?.value);
    let h = Number(document.getElementById("h"+i)?.value);
    if (!w || !h) continue;

    let sqft = (w * h) / 144;

    let type = document.getElementById("glass"+i)?.value;
    let thick = Number(document.getElementById("thickness"+i)?.value);
    let temper = document.getElementById("temper"+i)?.value;

    let holes = Number(document.getElementById("holes"+i)?.value) || 0;
    let extra = Number(document.getElementById("extra"+i)?.value) || 0;

    let base = 0;

    if (type === "clear") base = 8;
    if (type === "lowiron") base = 12;
    if (type === "laminated") base = 15;
    if (type === "mirror") base = 12;

    base = base * thick;

    if (temper === "yes") base += 12;

    let material = sqft * base;
    let holesCost = holes * 25;
    let subtotal = material + holesCost + extra;

    totalCosto += subtotal;
  }

  let margin = Number(document.getElementById("margin").value) || 40;

  let venta = totalCosto * (1 + margin / 100);
  let ganancia = venta - totalCosto;

  document.getElementById("total").innerHTML =
    `Costo: $${totalCosto.toFixed(2)}<br>
     Venta: $${venta.toFixed(2)}<br>
     Ganancia: $${ganancia.toFixed(2)}`;
}

agregarPieza();
</script>

</body>
</html>
