<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clarylux Calculator</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.container {
  width: 350px;
  margin-top: 40px;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.total {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Clarylux Calculator 🔥</h2>

  <div id="piezas"></div>

  <button onclick="agregarPieza()">+ Agregar pieza</button>
  <button onclick="calcular()">💰 Calcular Total</button>

  <div class="total" id="total">TOTAL: $0.00</div>
</div>

<script>
let contador = 0;

function agregarPieza() {
  contador++;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h4>Pieza ${contador}</h4>

    <input type="number" placeholder="Width (in)" id="w${contador}">
    <input type="number" placeholder="Height (in)" id="h${contador}">

    <select id="glass${contador}">
      <option value="clear">Clear</option>
      <option value="lowiron">Low Iron</option>
      <option value="laminated">Laminado</option>
      <option value="mirror">Mirror</option>
    </select>

    <select id="thickness${contador}">
      <option value="1">1/4</option>
      <option value="1.5">3/8</option>
      <option value="2">1/2</option>
      <option value="2.5">5/8</option>
    </select>

    <select id="temper${contador}">
      <option value="no">No Tempered</option>
      <option value="yes">Tempered</option>
    </select>

    <input type="number" placeholder="Holes ($25 c/u)" id="holes${contador}">
    <input type="number" placeholder="Extras $" id="extra${contador}">
  `;

  document.getElementById("piezas").appendChild(div);
}

function calcular() {
  let total = 0;

  for (let i = 1; i <= contador; i++) {
    let w = Number(document.getElementById("w"+i)?.value);
    let h = Number(document.getElementById("h"+i)?.value);

    if (!w || !h) continue;

    let sqft = (w * h) / 144;

    let type = document.getElementById("glass"+i)?.value;
    let thick = Number(document.getElementById("thickness"+i)?.value);
    let temper = document.getElementById("temper"+i)?.value;

    let holes = Number(document.getElementById("holes"+i)?.value) || 0;
    let extra = Number(document.getElementById("extra"+i)?.value) || 0;

    let basePrice = 0;

    // PRECIOS BASE (puedes ajustar luego)
    if (type === "clear") basePrice = 8;
    if (type === "lowiron") basePrice = 12;
    if (type === "laminated") basePrice = 15;
    if (type === "mirror") basePrice = 12;

    // espesor
    basePrice = basePrice * thick;

    // temperado
    if (temper === "yes") {
      basePrice += 12;
    }

    let material = sqft * basePrice;
    let holesCost = holes * 25;

    let subtotal = material + holesCost + extra;

    total += subtotal;
  }

  // margen 40%
  total = total * 1.4;

  document.getElementById("total").innerText =
    "TOTAL: $" + total.toFixed(2);
}

// inicia con una pieza
agregarPieza();
</script>

</body>
</html>
